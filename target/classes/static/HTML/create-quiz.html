<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تمرين | إنشاء اختبار جديد</title>
    <!-- Bootstrap 5 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Cairo for Arabic) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- ملفات الستايل -->
    <link rel="stylesheet" href="/CSS/style.css?v=200">
    <link rel="stylesheet" href="/CSS/quiz.css?v=200">
    
    <script src="/javascript/i18n.js?v=200"></script>
</head>
<body>

<!-- شريط التنقل (Navbar) -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand" href="/home">
            <i class="fas fa-file-alt me-2"></i>منصة تمرين
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="/home" data-i18n="home">الرئيسية</a></li>
        <li class="nav-item"><a class="nav-link active" href="/create-quiz" data-i18n="create-quiz">إنشاء اختبار</a></li>
        <li class="nav-item"><a class="nav-link" href="/home#features" data-i18n="features">المميزات</a></li>
            </ul>
            
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="#" class="btn btn btn-outline-light rounded-pill px-4 fw-bold" id="navLoginBtn" data-bs-toggle="modal" data-bs-target="#loginModal" data-i18n="login">
                    <i class="fas fa-user me-2"></i>تسجيل الدخول
                </a>
                
                <div class="theme-toggle-container">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-sun"></i>
                        <i class="fas fa-moon"></i>
                        <span class="theme-toggle-ball"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>



<!-- قسم بناء الاختبار -->
<section class="bg-body-tertiary py-5 pt-5 mt-5">
    <div class="container">
        <!-- خيارات إنشاء الاختبار (تبويب واحد فقط حالياً) -->
        <div class="d-flex justify-content-center mb-5">
            <div class="nav-tabs-custom">
                <button class="tab-btn active" id="manualTab" data-i18n="manual-tab">إنشاء الاختبار بنفسي</button>
            </div>
        </div>
        
        <!-- بطاقة الإعدادات الرئيسية -->
        <div class="card shadow border-0 p-4 p-md-5 rounded-4 mb-4" id="mainCard">
            
            <!-- عنوان الاختبار -->
            <div class="mb-4">
                <span class="h5 fw-bold mb-4 d-block" data-i18n="quiz-title-label">عنوان الاختبار <span style="color:#e53e3e">*</span></span>
                <input type="text" class="form-control form-control-lg" id="quizTitleInput" placeholder="اكتب عنوان الاختبار هنا..." data-i18n="quiz-title-placeholder">
                <div id="titleErrorBox" style="color: #e53e3e; margin-top: 10px; display: none;">
                    <i class="fas fa-exclamation-circle me-1"></i> <span id="titleErrorText"></span>
                </div>
            </div>
            <hr style="border-color: rgba(13, 110, 253, 0.2); margin: 30px 0;">

            <!-- عدد الأسئلة -->
            <div id="questionCountSection">
                <span class="h5 fw-bold mb-4 d-block text-center" data-i18n="question-count-label">عدد الأسئلة:</span>
                <div class="d-flex flex-wrap gap-2 mb-4 justify-content-center">
                    <input type="radio" class="btn-check" name="questionCount" id="count10" value="10" checked onchange="handleRadioChange(this)">
                    <label class="btn btn-outline-primary rounded-3 px-4 py-2 fw-bold" for="count10">10</label>

                    <input type="radio" class="btn-check" name="questionCount" id="count20" value="20" onchange="handleRadioChange(this)">
                    <label class="btn btn-outline-primary rounded-3 px-4 py-2 fw-bold" for="count20">20</label>

                    <input type="radio" class="btn-check" name="questionCount" id="count30" value="30" onchange="handleRadioChange(this)">
                    <label class="btn btn-outline-primary rounded-3 px-4 py-2 fw-bold" for="count30">30</label>

                    <input type="radio" class="btn-check" name="questionCount" id="count40" value="40" onchange="handleRadioChange(this)">
                    <label class="btn btn-outline-primary rounded-3 px-4 py-2 fw-bold" for="count40">40</label>

                    <input type="radio" class="btn-check" name="questionCount" id="count50" value="50" onchange="handleRadioChange(this)">
                    <label class="btn btn-outline-primary rounded-3 px-4 py-2 fw-bold" for="count50">50</label>
                </div>
            </div>
            
            <!-- Checkbox توضيح الإجابة -->
            <div class="form-check mb-4 mt-2" id="explainCheckboxWrapper">
                <label class="d-flex align-items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="form-check-input mt-0" id="showExplanation">
                    <span class="form-check-label fw-bold" data-i18n="show-explanation-label">إظهار توضيح الإجابة بعد كل سؤال</span>
                </label>
            </div>
            
            <!-- ===== قسم الأسئلة ===== -->
            <div class="questions-section" id="questionsSection">
                <h2 class="questions-title" data-i18n="quiz-questions-title">أسئلة الاختبار</h2>
                <div id="questionsContainer">
                    <!-- الأسئلة ستضاف هنا ديناميكياً عبر create-quiz.js -->
                </div>
                
                <div class="text-center mt-5">
                    <button class="btn btn-outline-primary border-2 fw-bold shadow-sm mb-5 rounded-4" style="border-style: dashed; min-width: 250px; padding: 15px; font-size: 1.1rem;" onclick="addNewQuestion()" data-i18n="add-question-btn">
                        <i class="fas fa-plus-circle me-2"></i> إضافة سؤال جديد
                    </button>
                    
                    <div id="mainSaveErrorBox" class="alert alert-danger" style="display: none; max-width: 500px; margin: 0 auto 20px auto;">
                        <i class="fas fa-exclamation-circle me-1"></i> <span id="mainSaveErrorText"></span>
                    </div>
                </div>
            </div>
            
            <!-- زر الحفظ -->
            <div class="save-section d-flex justify-content-center pt-3 border-top">
                <button class="btn btn-primary rounded-pill px-5 py-3 fw-bold w-100 js-btn-primary shadow" style="max-width: 300px;" id="saveBtn" data-i18n="save-quiz-btn">
                    <i class="fas fa-save me-2"></i> حفظ الاختبار
                </button>
            </div>
        </div>
    </div>
</section>

<!-- القسم السفلي -->
<footer class="bg-dark mt-auto text-white py-4">
    <div class="container text-center">
        <p class="mb-1"><span data-i18n="footer-rights">جميع الحقوق محفوظة &copy; 2026</span> <strong><span data-i18n="footer-platform">منصة تمرين</span></strong></p>
        <p class="mb-0"><a href="https://github.com/d7mSWE/Tamreen" target="_blank" class="text-primary text-decoration-none fw-bold">d7mSWE</a></p>
    </div>
</footer>

<!-- Modals for Login/Register (required by app.js) -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content auth-modal">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="loginModalLabel" style="font-weight: 700; color: var(--text-primary);" data-i18n="login-title">تسجيل الدخول</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="loginAlert" class="alert alert-danger" style="display: none; border-radius: 10px;"></div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: var(--text-primary);" data-i18n="username-label">اسم المستخدم</label>
            <input type="text" class="form-control auth-input" id="loginUsername" required style="border-radius: 12px; padding: 10px 15px;">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: var(--text-primary);" data-i18n="current-password">كلمة المرور</label>
            <input type="password" class="form-control auth-input" id="loginPassword" required style="border-radius: 12px; padding: 10px 15px;">
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2" style="border-radius: 12px; padding: 10px; font-weight: 600;" data-i18n="login-submit">دخول</button>
        </form>
        <div class="text-center mt-4 mb-2">
            <span style="color: var(--text-muted);" data-i18n="no-account">ليس لديك حساب؟ </span><a href="#" style="color: var(--primary-color); font-weight: 700; text-decoration: none;" data-bs-dismiss="modal" data-bs-toggle="modal" data-bs-target="#registerModal" data-i18n="register-now">سجل الآن</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content auth-modal">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="registerModalLabel" style="font-weight: 700; color: var(--text-primary);" data-i18n="register-title">إنشاء حساب جديد</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="registerAlert" class="alert alert-danger" style="display: none; border-radius: 10px;"></div>
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: var(--text-primary);" data-i18n="email-label">البريد الإلكتروني</label>
            <input type="email" class="form-control auth-input" id="registerEmail" required style="border-radius: 12px; padding: 10px 15px;">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: var(--text-primary);" data-i18n="username-label">اسم المستخدم</label>
            <input type="text" class="form-control auth-input" id="registerUsername" required style="border-radius: 12px; padding: 10px 15px;">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: var(--text-primary);" data-i18n="password-label">كلمة المرور</label>
            <input type="password" class="form-control auth-input" id="registerPassword" required style="border-radius: 12px; padding: 10px 15px;">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: var(--text-primary);" data-i18n="confirm-password-label">تأكيد كلمة المرور</label>
            <input type="password" class="form-control auth-input" id="registerPasswordConfirm" required style="border-radius: 12px; padding: 10px 15px;">
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2" style="border-radius: 12px; padding: 10px; font-weight: 600;" data-i18n="register-submit">إنشاء الحساب</button>
        </form>
        <div class="text-center mt-4 mb-2">
            <span style="color: var(--text-muted);" data-i18n="have-account">لديك حساب بالفعل؟ </span><a href="#" style="color: var(--primary-color); font-weight: 700; text-decoration: none;" data-bs-dismiss="modal" data-bs-toggle="modal" data-bs-target="#loginModal" data-i18n="login-now">سجل دخولك</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js?v=200"></script>

<!-- تطبيق المنصة الفعلي -->
<script src="/javascript/theme.js?v=200"></script>
<script src="/javascript/auth.js?v=200"></script>
<script src="/javascript/create-quiz.js?v=200"></script>

</body>
</html>
